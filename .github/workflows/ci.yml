name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci
      - run: pip install ruff
      - run: npx eslint src --ext ts,tsx --no-error-on-unmatched-pattern || echo "ESLint warnings OK"
        working-directory: apps/desktop
      - run: npx tsc --noEmit
        working-directory: apps/desktop
      - run: ruff check apps/engine/ --select=E,F,I,N,W,UP --ignore=E501 --output-format=concise
      - run: ruff format apps/engine/ --check

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci
      - run: pip install -r apps/engine/requirements.txt uvicorn
      - run: npx vitest run
        working-directory: apps/desktop
      - run: npm run build
        working-directory: apps/desktop
      - name: Playwright E2E
        run: |
          npx playwright install chromium --with-deps
          npx playwright test tests_e2e/ --config=tests_e2e/playwright.config.ts
        working-directory: apps/desktop

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/engine
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: pytest -v --ignore=tests/test_agent_websocket.py --ignore=tests/test_ai_ws.py --ignore=tests/test_agent_integration.py
