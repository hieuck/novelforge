name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-nsis:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci
      - run: pip install -r apps/engine/requirements.txt pyinstaller
      - run: npx tsc --noEmit
        working-directory: apps/desktop
      - run: npm run build
        working-directory: apps/desktop
      - run: npx electron-builder --win --x64
        working-directory: apps/desktop
      - uses: actions/upload-artifact@v4
        with:
          name: NovelForge-Installer
          path: apps/desktop/release/*.exe
